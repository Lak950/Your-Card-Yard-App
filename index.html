<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Car Yard</title>
<style>
:root{--navy:#07357d;--navy2:#03295b;--orange:#ff7a00;--blue:#0d57bf;--bg:#f6f7fb;--line:#d7dbe4;--muted:#64748b;--red:#b91c1c;--green:#15803d}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#1c2c4d}button,input,select,textarea{font:inherit}a{text-decoration:none;color:inherit}
.top{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;padding:22px}.top-inner{max-width:1250px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:16px}.logo{width:78px;height:78px;border:7px solid var(--orange);border-radius:50%;display:grid;place-items:center}.logo svg{width:44px;fill:#fff}
h1{font-size:48px;line-height:.9;margin:0;letter-spacing:-1.5px}.tag{font-size:20px;margin:8px 0 0;color:#dbeafe}
.nav{background:#03295b}.nav-inner{max-width:1250px;margin:auto;padding:12px 22px;display:flex;gap:10px;flex-wrap:wrap}.nav button,.nav a{border:0;border-radius:8px;padding:12px 16px;font-weight:800;color:#fff;background:transparent;cursor:pointer}.nav .active,.orange{background:linear-gradient(180deg,#ff8b1a,#ff7900)!important}
.page{max-width:1250px;margin:22px auto;padding:0 22px 40px}.hidden{display:none!important}.panel,.filters,.card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:18px}
.grid{display:grid;grid-template-columns:280px 1fr;gap:18px}.search{display:grid;grid-template-columns:1fr 220px;gap:14px;margin-bottom:18px}
input,select,textarea{width:100%;border:2px solid var(--line);border-radius:10px;padding:12px;background:#fff}textarea{min-height:90px}label{display:block;font-size:13px;font-weight:800;text-transform:uppercase;color:#52627a;margin:12px 0 6px}
.primary{border:0;border-radius:10px;background:linear-gradient(180deg,#0e58bf,#0c49a6);color:#fff;font-weight:800;padding:13px 18px;cursor:pointer}.secondary{border:1px solid #cbd7ef;background:#eef3fb;color:#174593;border-radius:10px;font-weight:800;padding:12px 16px;cursor:pointer}.danger{border:1px solid #f3c1b8;background:#ffebe8;color:#c43720;border-radius:10px;font-weight:800;padding:12px 16px;cursor:pointer}
.vehicle-list{display:grid;gap:16px}.vehicle{display:grid;grid-template-columns:320px 1fr;gap:18px;position:relative}.img{width:100%;aspect-ratio:16/10;border-radius:10px;overflow:hidden;background:#e5e7eb}.img img{width:100%;height:100%;object-fit:cover}.thumbs{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px}.thumbs div{aspect-ratio:4/3;background:#eef1f7;border-radius:6px;overflow:hidden}.thumbs img{width:100%;height:100%;object-fit:cover}
.badge{display:inline-block;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;background:#ecfdf5;color:var(--green)}.sold{background:#fee2e2;color:var(--red)}.featured{position:absolute;left:18px;top:32px;background:var(--orange);color:#fff;font-weight:900;padding:8px 16px;border-radius:0 999px 999px 0}.price{font-size:32px;color:var(--orange);font-weight:900;margin:10px 0}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.meta span{background:#f2f6fb;border:1px solid #d7ddeb;border-radius:999px;padding:7px 10px;font-size:14px}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.call,.sms,.email{border-radius:10px;padding:12px 14px;font-weight:900}.call{background:linear-gradient(180deg,#ff8b19,#ff7300);color:#fff}.sms{background:linear-gradient(180deg,#1b67cd,#0d53bb);color:#fff}.email{background:#fff;color:#15408e;border:2px solid #265fbc}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.msg{padding:12px;border-radius:10px;margin:12px 0;background:#eef3fb;color:#174593}.error{background:#fee2e2;color:#991b1b}.seller-link{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;border-radius:12px;padding:12px;margin:12px 0;word-break:break-all}.admin-row{border:1px solid #dce2ee;border-radius:12px;padding:12px;display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
@media(max-width:850px){h1{font-size:34px}.logo{width:66px;height:66px}.grid,.search,.vehicle,.formgrid{grid-template-columns:1fr}.page{padding:0 14px 30px}}
</style>
</head>
<body>
<div class="top"><div class="top-inner"><div class="brand"><div class="logo"><svg viewBox="0 0 64 64"><path d="M15.6 34.1 20.2 22c1-2.7 3.6-4.5 6.5-4.5h10.6c2.9 0 5.5 1.8 6.5 4.5l4.6 12.1c3.2 1 5.6 4 5.6 7.6v8.1c0 1.3-1.1 2.4-2.4 2.4h-3.5c-1.3 0-2.4-1.1-2.4-2.4v-2.1H17.8v2.1c0 1.3-1.1 2.4-2.4 2.4h-3.5c-1.3 0-2.4-1.1-2.4-2.4v-8.1c0-3.6 2.4-6.6 6.1-7.6Zm8.3-9.8-3.1 8.2h22.4l-3.1-8.2c-.4-1.1-1.5-1.9-2.7-1.9H26.6c-1.2 0-2.3.8-2.7 1.9Zm-3.7 18.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Zm23.6 0a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z"/></svg></div><div><h1>Your Car Yard</h1><p class="tag">Small car sellers. Simple online yards.</p></div></div><a class="orange" style="padding:14px 18px;border-radius:8px;font-weight:800" href="#marketplace">BROWSE CARS</a></div></div>
<div class="nav"><div class="nav-inner"><button class="active" onclick="showSection('marketplace')">HOME</button><button onclick="showSection('marketplace')">BROWSE CARS</button><button onclick="showSection('auth')">SIGN UP / LOGIN</button><button onclick="showSection('dashboard')">MY CAR YARD</button></div></div>
<main class="page">
<section id="marketplace">
<div class="search"><input id="searchInput" placeholder="Search all cars by make, model, year, location or price" oninput="loadMarketplace()"><button class="primary" onclick="clearSearch()">SHOW ALL CARS</button></div>
<div class="grid"><aside class="filters"><h2>Browse Cars</h2><label>Make</label><select id="filterMake"></select><label>Model</label><select id="filterModel" onchange="loadMarketplace()"></select><label>Body Type</label><select id="filterBody" onchange="loadMarketplace()"><option value="">All Types</option><option>SUV</option><option>Hatchback</option><option>Sedan</option><option>Ute</option><option>Wagon</option><option>Van</option><option>Coupe</option><option>Convertible</option></select><label>Fuel Type</label><select id="filterFuel" onchange="loadMarketplace()"><option value="">All Fuel</option><option>Petrol</option><option>Diesel</option><option>Hybrid</option><option>Electric</option><option>Plug-in Hybrid</option></select></aside><div><div id="marketMsg" class="msg hidden"></div><div id="vehicleList" class="vehicle-list"></div></div></div>
</section>
<section id="auth" class="hidden"><div class="panel"><h2>Seller Sign Up / Login</h2><div id="authMsg" class="msg hidden"></div><div class="formgrid"><div><h3>Create Account</h3><label>Email</label><input id="signupEmail" type="email"><label>Password</label><input id="signupPassword" type="password"><button class="primary" onclick="signUp()">Create Account</button></div><div><h3>Login</h3><label>Email</label><input id="loginEmail" type="email"><label>Password</label><input id="loginPassword" type="password"><button class="primary" onclick="login()">Login</button></div></div></div></section>
<section id="dashboard" class="hidden"><div class="panel"><h2>My Car Yard Dashboard</h2><div id="dashMsg" class="msg hidden"></div><div id="notLoggedIn"><p>You need to login before you can add vehicles.</p><button class="primary" onclick="showSection('auth')">Login / Sign Up</button></div><div id="sellerArea" class="hidden"><button class="secondary" onclick="logout()">Logout</button><h3>Seller Profile</h3><div class="formgrid"><div><label>Yard Name</label><input id="yardName" placeholder="Lee's Car Yard"></div><div><label>Unique Link Slug</label><input id="slug" placeholder="lees-car-yard"></div><div><label>Display Name</label><input id="displayName"></div><div><label>Suburb</label><input id="suburb"></div><div><label>State</label><input id="state" placeholder="NSW"></div><div><label>Phone</label><input id="profilePhone"></div><div><label>SMS</label><input id="profileSms"></div><div><label>Email</label><input id="profileEmail"></div></div><label>About Your Yard</label><textarea id="about"></textarea><p><label style="display:flex;gap:8px;align-items:center;text-transform:none"><input id="showEmail" type="checkbox" checked style="width:auto"> Show email button publicly</label></p><button class="primary" onclick="saveProfile()">Save Profile</button><div id="sellerLink" class="seller-link hidden"></div>
<h3 style="margin-top:28px">Add / Edit Vehicle</h3><input id="editingVehicleId" type="hidden"><div class="formgrid"><div><label>Make</label><input id="vMake"></div><div><label>Model</label><input id="vModel"></div><div><label>Variant</label><input id="vVariant"></div><div><label>Year</label><input id="vYear" type="number"></div><div><label>Kilometres</label><input id="vKms" type="number"></div><div><label>Transmission</label><input id="vTrans"></div><div><label>Fuel</label><input id="vFuel"></div><div><label>Body Type</label><input id="vBody"></div><div><label>Colour</label><input id="vColour"></div><div><label>Price</label><input id="vPrice" type="number"></div><div><label>Price Label</label><select id="vPriceLabel"><option>Drive Away</option><option>Negotiable</option><option>Finance Available</option><option>Trade-ins Welcome</option><option>ONO</option></select></div><div><label>Status</label><select id="vStatus"><option>Available</option><option>Sold</option><option>Coming Soon</option><option>Hidden</option></select></div></div><p><label style="display:flex;gap:8px;align-items:center;text-transform:none"><input id="vFeatured" type="checkbox" style="width:auto"> Featured vehicle</label></p><label>Description</label><textarea id="vDesc"></textarea><div class="formgrid"><div><label style="display:flex;gap:8px;align-items:center;text-transform:none"><input id="showService" type="checkbox" style="width:auto"> Show service history</label><input id="vService" placeholder="Full service history"></div><div><label style="display:flex;gap:8px;align-items:center;text-transform:none"><input id="showRoadworthy" type="checkbox" style="width:auto"> Show roadworthy</label><input id="vRoadworthy" placeholder="Roadworthy included"></div><div><label style="display:flex;gap:8px;align-items:center;text-transform:none"><input id="showWarranty" type="checkbox" style="width:auto"> Show warranty</label><input id="vWarranty" placeholder="Warranty included"></div></div><h4>Vehicle Photos</h4><label>Main Photo</label><input id="mainPhoto" type="file" accept="image/*"><div class="formgrid"><div><label>View 1</label><input class="extraPhoto" type="file" accept="image/*"></div><div><label>View 2</label><input class="extraPhoto" type="file" accept="image/*"></div><div><label>View 3</label><input class="extraPhoto" type="file" accept="image/*"></div><div><label>View 4</label><input class="extraPhoto" type="file" accept="image/*"></div><div><label>View 5</label><input class="extraPhoto" type="file" accept="image/*"></div><div><label>View 6</label><input class="extraPhoto" type="file" accept="image/*"></div></div><div class="actions"><button class="primary" onclick="saveVehicle()">Save Vehicle</button><button class="secondary" onclick="clearVehicleForm()">Clear Vehicle Form</button></div><h3 style="margin-top:28px">My Vehicles</h3><div id="myVehicles"></div></div></div></section>
</main>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://jbakjwufspxnhvqsjqec.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_L2a9KE04GRAr9jWD-b3xeQ_Em16lCaX";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser=null,currentProfile=null;
const MAKES={Toyota:["Camry","Corolla","HiLux","Kluger","LandCruiser","Prado","RAV4","Yaris"],Mazda:["2","3","6","BT-50","CX-3","CX-30","CX-5","CX-90"],Hyundai:["i30","Kona","Palisade","Santa Fe","Tucson","Venue"],Kia:["Carnival","Cerato","EV3","EV5","EV6","EV9","Picanto","Seltos","Sorento","Sportage"],Ford:["Everest","Escape","Focus","Mustang","Ranger","Transit"],Holden:["Astra","Barina","Colorado","Commodore","Cruze","Trax"],Mitsubishi:["ASX","Eclipse Cross","Outlander","Pajero Sport","Triton"],Nissan:["Juke","Navara","Pathfinder","Patrol","Qashqai","X-Trail"],Volkswagen:["Amarok","Golf","Passat","Polo","T-Cross","T-Roc","Tiguan","Touareg"],MG:["3","4","5","HS","ZS","ZS EV"],Honda:["Accord","Civic","CR-V","HR-V","Jazz"],Subaru:["BRZ","Crosstrek","Forester","Impreza","Outback","WRX"],BMW:["1 Series","2 Series","3 Series","4 Series","5 Series","X1","X3","X5"],"Mercedes-Benz":["A-Class","C-Class","E-Class","GLA","GLC","GLE"],Audi:["A1","A3","A4","Q2","Q3","Q5","Q7"],Tesla:["Model 3","Model S","Model X","Model Y"],BYD:["Atto 3","Dolphin","Seal","Sealion 6"],Isuzu:["D-MAX","MU-X"],Suzuki:["Ignis","Jimny","S-Cross","Swift","Vitara"],Lexus:["ES","IS","NX","RX","UX"],Volvo:["XC40","XC60","XC90","EX30"],GWM:["Cannon","Haval H6","Haval Jolion","Ora","Tank 300"],LDV:["D90","G10","Mifa","T60","Deliver 9"]};
function $(id){return document.getElementById(id)}function msg(id,t,e=false){const x=$(id);x.textContent=t;x.className="msg"+(e?" error":"");x.classList.remove("hidden")}function hide(id){$(id).classList.add("hidden")}function slugify(t){return String(t||"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")}function money(n){return n==null||n===""?"Price on enquiry":"$"+Number(n).toLocaleString()}function phone(n){return String(n||"").replace(/[^\d+]/g,"")}
window.showSection=function(id){["marketplace","auth","dashboard"].forEach(s=>$(s).classList.add("hidden"));$(id).classList.remove("hidden");if(id==="dashboard")initDashboard()}
function populateFilters(){let make=$("filterMake").value;$("filterMake").innerHTML='<option value="">All Makes</option>'+Object.keys(MAKES).sort().map(m=>`<option>${m}</option>`).join("");if(make)$("filterMake").value=make;const models=make?MAKES[make]||[]:Object.values(MAKES).flat();$("filterModel").innerHTML='<option value="">All Models</option>'+[...new Set(models)].sort().map(m=>`<option>${m}</option>`).join("")}
$("filterMake").addEventListener("change",()=>{populateFilters();loadMarketplace()});window.clearSearch=function(){$("searchInput").value="";$("filterMake").value="";populateFilters();$("filterModel").value="";$("filterBody").value="";$("filterFuel").value="";loadMarketplace()}
async function loadSession(){const {data}=await supabase.auth.getSession();currentUser=data.session?.user||null;if(currentUser)await loadProfile()}async function loadProfile(){const {data,error}=await supabase.from("profiles").select("*").eq("user_id",currentUser.id).maybeSingle();if(error)console.error(error);currentProfile=data||null;if(currentProfile)fillProfileForm()}
window.signUp=async function(){hide("authMsg");const email=$("signupEmail").value.trim(),password=$("signupPassword").value;const {error}=await supabase.auth.signUp({email,password});if(error)return msg("authMsg",error.message,true);msg("authMsg","Account created. Check your email if Supabase asks for confirmation, then login.")}
window.login=async function(){hide("authMsg");const email=$("loginEmail").value.trim(),password=$("loginPassword").value;const {data,error}=await supabase.auth.signInWithPassword({email,password});if(error)return msg("authMsg",error.message,true);currentUser=data.user;await loadProfile();msg("authMsg","Logged in successfully.");showSection("dashboard")}
window.logout=async function(){await supabase.auth.signOut();currentUser=null;currentProfile=null;initDashboard();showSection("marketplace")}
function initDashboard(){if(!currentUser){$("notLoggedIn").classList.remove("hidden");$("sellerArea").classList.add("hidden")}else{$("notLoggedIn").classList.add("hidden");$("sellerArea").classList.remove("hidden");if(currentProfile)fillProfileForm();loadMyVehicles()}}
function fillProfileForm(){const p=currentProfile;$("yardName").value=p.yard_name||"";$("slug").value=p.slug||"";$("displayName").value=p.display_name||"";$("suburb").value=p.suburb||"";$("state").value=p.state||"";$("profilePhone").value=p.phone||"";$("profileSms").value=p.sms||"";$("profileEmail").value=p.email||"";$("about").value=p.about||"";$("showEmail").checked=p.show_email!==false;$("sellerLink").textContent="Your share link: "+location.origin+location.pathname+"?seller="+p.slug;$("sellerLink").classList.remove("hidden")}
window.saveProfile=async function(){if(!currentUser)return msg("dashMsg","Please login first.",true);let yard=$("yardName").value.trim(),slug=slugify($("slug").value||yard);if(!yard||!slug)return msg("dashMsg","Enter a yard name and unique link slug.",true);const payload={user_id:currentUser.id,yard_name:yard,slug,display_name:$("displayName").value.trim(),suburb:$("suburb").value.trim(),state:$("state").value.trim(),phone:$("profilePhone").value.trim(),sms:$("profileSms").value.trim(),email:$("profileEmail").value.trim(),show_email:$("showEmail").checked,about:$("about").value.trim(),is_active:true};const {data,error}=await supabase.from("profiles").upsert(payload,{onConflict:"user_id"}).select().single();if(error)return msg("dashMsg",error.message,true);currentProfile=data;fillProfileForm();msg("dashMsg","Profile saved.");loadMarketplace()}
async function uploadFile(file,vehicleId,order,isMain=false){if(!file)return;const ext=file.name.split(".").pop()||"jpg";const path=`${currentUser.id}/${vehicleId}/${Date.now()}-${order}.${ext}`;const {error:upErr}=await supabase.storage.from("vehicle-images").upload(path,file,{upsert:false});if(upErr)throw upErr;const {data}=supabase.storage.from("vehicle-images").getPublicUrl(path);const {error}=await supabase.from("vehicle_images").insert({vehicle_id:vehicleId,image_url:data.publicUrl,storage_path:path,sort_order:order,is_main:isMain});if(error)throw error}
window.saveVehicle=async function(){hide("dashMsg");if(!currentProfile)return msg("dashMsg","Save your seller profile first.",true);if(!$("vMake").value.trim()||!$("vModel").value.trim())return msg("dashMsg","Enter at least make and model.",true);const id=$("editingVehicleId").value||null;const payload={seller_id:currentProfile.id,make:$("vMake").value.trim(),model:$("vModel").value.trim(),variant:$("vVariant").value.trim(),year:$("vYear").value?Number($("vYear").value):null,kilometres:$("vKms").value?Number($("vKms").value):null,transmission:$("vTrans").value.trim(),fuel:$("vFuel").value.trim(),body_type:$("vBody").value.trim(),colour:$("vColour").value.trim(),price:$("vPrice").value?Number($("vPrice").value):null,price_label:$("vPriceLabel").value,status:$("vStatus").value,featured:$("vFeatured").checked,description:$("vDesc").value.trim(),show_service_history:$("showService").checked,service_history:$("vService").value.trim(),show_roadworthy:$("showRoadworthy").checked,roadworthy:$("vRoadworthy").value.trim(),show_warranty:$("showWarranty").checked,warranty:$("vWarranty").value.trim()};let result=id?await supabase.from("vehicles").update(payload).eq("id",id).select().single():await supabase.from("vehicles").insert(payload).select().single();if(result.error)return msg("dashMsg",result.error.message,true);let vehicleId=result.data.id;try{if($("mainPhoto").files[0])await uploadFile($("mainPhoto").files[0],vehicleId,0,true);const extras=document.querySelectorAll(".extraPhoto");for(let i=0;i<extras.length;i++)if(extras[i].files[0])await uploadFile(extras[i].files[0],vehicleId,i+1,false)}catch(e){return msg("dashMsg","Vehicle saved, but image upload failed: "+e.message,true)}msg("dashMsg","Vehicle saved.");clearVehicleForm();loadMyVehicles();loadMarketplace()}
window.clearVehicleForm=function(){["editingVehicleId","vMake","vModel","vVariant","vYear","vKms","vTrans","vFuel","vBody","vColour","vPrice","vDesc","vService","vRoadworthy","vWarranty"].forEach(id=>$(id).value="");$("vPriceLabel").value="Drive Away";$("vStatus").value="Available";["vFeatured","showService","showRoadworthy","showWarranty"].forEach(id=>$(id).checked=false);$("mainPhoto").value="";document.querySelectorAll(".extraPhoto").forEach(i=>i.value="")}
async function loadMyVehicles(){if(!currentProfile)return;const {data,error}=await supabase.from("vehicles").select("*").eq("seller_id",currentProfile.id).order("created_at",{ascending:false});if(error)return msg("dashMsg",error.message,true);$("myVehicles").innerHTML=(data||[]).map(v=>`<div class="admin-row"><div><strong>${v.year||""} ${v.make} ${v.model}</strong><br><span>${money(v.price)} • ${v.status}</span></div><div class="actions"><button class="secondary" onclick='editVehicle(${JSON.stringify(v).replaceAll("'","&#39;")})'>Edit</button><button class="danger" onclick="deleteVehicle('${v.id}')">Delete</button></div></div>`).join("")||"<p>No vehicles yet.</p>"}
window.editVehicle=function(v){$("editingVehicleId").value=v.id;$("vMake").value=v.make||"";$("vModel").value=v.model||"";$("vVariant").value=v.variant||"";$("vYear").value=v.year||"";$("vKms").value=v.kilometres||"";$("vTrans").value=v.transmission||"";$("vFuel").value=v.fuel||"";$("vBody").value=v.body_type||"";$("vColour").value=v.colour||"";$("vPrice").value=v.price||"";$("vPriceLabel").value=v.price_label||"Drive Away";$("vStatus").value=v.status||"Available";$("vFeatured").checked=!!v.featured;$("vDesc").value=v.description||"";$("showService").checked=!!v.show_service_history;$("vService").value=v.service_history||"";$("showRoadworthy").checked=!!v.show_roadworthy;$("vRoadworthy").value=v.roadworthy||"";$("showWarranty").checked=!!v.show_warranty;$("vWarranty").value=v.warranty||"";window.scrollTo({top:0,behavior:"smooth"})}
window.deleteVehicle=async function(id){if(!confirm("Delete this vehicle?"))return;const {error}=await supabase.from("vehicles").delete().eq("id",id);if(error)return msg("dashMsg",error.message,true);loadMyVehicles();loadMarketplace()}
async function imagesFor(id){const {data}=await supabase.from("vehicle_images").select("*").eq("vehicle_id",id).order("is_main",{ascending:false}).order("sort_order");return data||[]}
window.loadMarketplace=async function(){hide("marketMsg");let query=supabase.from("public_vehicle_listings").select("*").order("featured",{ascending:false}).order("created_at",{ascending:false});const seller=new URLSearchParams(location.search).get("seller");if(seller)query=query.eq("seller_slug",seller);const make=$("filterMake").value,model=$("filterModel").value,body=$("filterBody").value,fuel=$("filterFuel").value,q=$("searchInput").value.trim().toLowerCase();if(make)query=query.eq("make",make);if(model)query=query.eq("model",model);if(body)query=query.eq("body_type",body);if(fuel)query=query.eq("fuel",fuel);const {data,error}=await query;if(error)return msg("marketMsg",error.message,true);let rows=data||[];if(q)rows=rows.filter(v=>[v.yard_name,v.make,v.model,v.variant,v.year,v.suburb,v.state,v.price,v.colour].join(" ").toLowerCase().includes(q));const list=$("vehicleList");if(!rows.length){list.innerHTML="<div class='panel'>No vehicles found.</div>";return}list.innerHTML="";for(const v of rows){const imgs=await imagesFor(v.id);const main=v.main_image_url||imgs[0]?.image_url||placeholder();const thumbs=imgs.slice(0,6).map(i=>`<div><img src="${i.image_url}"></div>`).join("");const email=v.seller_email?`<a class="email" href="mailto:${v.seller_email}?subject=${encodeURIComponent('Vehicle Enquiry - '+v.make+' '+v.model)}">Email Enquiry</a>`:"";const optional=[v.show_service_history&&v.service_history,v.show_roadworthy&&v.roadworthy,v.show_warranty&&v.warranty].filter(Boolean).map(x=>`<span>${x}</span>`).join("");list.innerHTML+=`<article class="card vehicle">${v.featured?'<div class="featured">FEATURED</div>':''}<div><div class="img"><img src="${main}"></div><div class="thumbs">${thumbs}</div></div><div><span class="badge ${v.status==='Sold'?'sold':''}">${v.status}</span><h2>${v.year||""} ${v.make} ${v.model} ${v.variant||""}</h2><p><strong>${v.yard_name}</strong>${v.suburb?" • "+v.suburb:""}${v.state?", "+v.state:""}</p><div class="meta"><span>${v.kilometres?Number(v.kilometres).toLocaleString()+" km":"KMs not listed"}</span><span>${v.transmission||"Transmission not listed"}</span><span>${v.fuel||"Fuel not listed"}</span><span>${v.body_type||"Body not listed"}</span><span>${v.colour||"Colour not listed"}</span>${optional}</div><p>${v.description||""}</p><div class="price">${money(v.price)} <span style="font-size:15px;color:#174593">${v.price_label||""}</span></div><div class="actions"><a class="call" href="tel:${phone(v.seller_phone)}">Call Now</a><a class="sms" href="sms:${phone(v.seller_sms||v.seller_phone)}">Text Enquiry</a>${email}<button class="secondary" onclick="shareVehicle('${v.year||""} ${v.make} ${v.model}','${money(v.price)}')">Share</button></div></div></article>`}}
function placeholder(){return "data:image/svg+xml;charset=UTF-8,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='900' height='560'><rect width='100%' height='100%' fill='#e5e7eb'/><text x='50%' y='50%' text-anchor='middle' dominant-baseline='middle' font-family='Arial' font-size='34' fill='#6b7280'>Vehicle Photo</text></svg>")}
window.shareVehicle=async function(title,price){const text=title+" - "+price+" on Your Car Yard";if(navigator.share)await navigator.share({title,text,url:location.href}).catch(()=>{});else{await navigator.clipboard.writeText(text+" "+location.href);alert("Copied to clipboard.")}}
populateFilters();await loadSession();await loadMarketplace();initDashboard();
</script>
</body>
</html>
